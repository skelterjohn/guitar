# Guitar site — Cloud Build pipeline
#
# Prerequisites (one-time GCP setup):
#   - GCS bucket with public read (allUsers: storage.objectViewer)
#   - nginx in the site image proxies /pdf/ to the bucket (no browser CORS needed)
#   - catalog PDFs live under pub/ in the bucket; hidden dirs sync separately
#   - repertoire.yaml is uploaded to the bucket root for runtime /rep config
#   - Artifact Registry repo for container images
#   - Cloud Build service account: storage.objectAdmin on bucket, Cloud Run Admin, AR Writer
#
# Substitutions (set when triggering the build):
#   _REGION        — e.g. us-east4
#   _AR_REPO       — e.g. us-east4-docker.pkg.dev/PROJECT/guitar
#   _SERVICE       — Cloud Run service name, e.g. guitar-site
#   _BOOKEND_SERVICE — Cloud Run service name for book API, e.g. guitar-bookend
#   _BOOKEND_ORIGIN  — Cloud Run origin for book API, e.g. https://guitar-bookend-PROJECT_NUMBER.us-east4.run.app
#   _PDF_BUCKET    — GCS bucket name (without gs://)
#   _BOOK_BUCKET   — GCS bucket for user PDF uploads (without gs://)
#   _PDF_BASE_URL  — same-origin PDF path proxied to GCS, e.g. /pdf
#
# Firebase web config (public, domain-restricted) is baked into the static
# bundle at build time via _FIREBASE_* substitutions below.
#
# Example:
#   gcloud builds submit --config=build-site.yaml \
#     --substitutions=...,_PDF_BASE_URL=/pdf

substitutions:
  _REGION: us-east4
  _AR_REPO: us-east4-docker.pkg.dev/skelterjohnguitar/guitar
  _SERVICE: guitar-site
  _BOOKEND_SERVICE: guitar-bookend
  _BOOKEND_ORIGIN: https://guitar-bookend-634515039958.us-east4.run.app
  _PDF_BUCKET: skelterjohnguitar-pdf
  _BOOK_BUCKET: skelterjohnguitar-book
  _PDF_BASE_URL: /pdf
  _FIREBASE_PROJECT_ID: skelterjohnguitar
  _FIREBASE_API_KEY: AIzaSyDjXhfqk2xP6EYeG7t71ZkzcFFGwtMAv5U
  _FIREBASE_AUTH_DOMAIN: skelterjohnguitar.firebaseapp.com
  _FIREBASE_STORAGE_BUCKET: skelterjohnguitar.firebasestorage.app
  _FIREBASE_MESSAGING_SENDER_ID: "634515039958"
  _FIREBASE_APP_ID: 1:634515039958:web:891fa09cdf4cba2c0e0b77

steps:
  # --- PDF sync (independent; runs concurrently) ---
  - name: gcr.io/cloud-builders/gsutil
    id: sync-pdfs
    waitFor: ['-']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        staging=$$(mktemp -d)
        cp pdf/*.pdf "$$staging/"
        gsutil -m rsync -r -d "$$staging/" "gs://${_PDF_BUCKET}/pub/"

  # --- Frontend pipeline (runs concurrently with backend) ---
  - name: node:22-alpine
    id: site-assets
    waitFor: ['-']
    entrypoint: sh
    args:
      - -c
      - cd site && npm ci && ENRICH_HASHES=1 npm run enrich && npm run validate

  - name: gcr.io/cloud-builders/gsutil
    id: sync-repertoire
    waitFor: ['site-assets']
    args:
      - -h
      - Cache-Control:no-cache
      - -h
      - Content-Type:text/yaml
      - cp
      - site/src/data/repertoire.yaml
      - gs://${_PDF_BUCKET}/repertoire.yaml

  - name: gcr.io/cloud-builders/docker
    id: site-build
    waitFor: ['site-assets']
    dir: site
    args:
      - build
      - --build-arg
      - VITE_PDF_BASE_URL=${_PDF_BASE_URL}
      - --build-arg
      - VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg
      - VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - VITE_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg
      - VITE_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - VITE_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - --tag=${_AR_REPO}/site:v$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: site-push
    waitFor: ['site-build']
    args:
      - push
      - ${_AR_REPO}/site:v$SHORT_SHA

  - name: gcr.io/cloud-builders/gcloud
    id: site-deploy
    waitFor: ['site-push']
    args:
      - -q
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_REPO}/site:v$SHORT_SHA
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --revision-suffix=v$SHORT_SHA
      - --service-account=skelterjohnguitar-site@skelterjohnguitar.iam.gserviceaccount.com
      - --port=8080
      - --set-env-vars=BOOKEND_ORIGIN=${_BOOKEND_ORIGIN}

  # --- Backend pipeline (runs concurrently with frontend) ---
  - name: gcr.io/cloud-builders/docker
    id: bookend-build
    waitFor: ['-']
    dir: site/bookend
    args:
      - build
      - --tag=${_AR_REPO}/bookend:v$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: bookend-push
    waitFor: ['bookend-build']
    args:
      - push
      - ${_AR_REPO}/bookend:v$SHORT_SHA

  - name: gcr.io/cloud-builders/gcloud
    id: bookend-deploy
    waitFor: ['bookend-push']
    args:
      - -q
      - run
      - deploy
      - ${_BOOKEND_SERVICE}
      - --image=${_AR_REPO}/bookend:v$SHORT_SHA
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --revision-suffix=v$SHORT_SHA
      - --service-account=bookend@skelterjohnguitar.iam.gserviceaccount.com
      - --port=8080
      - --set-env-vars=FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},BOOK_BUCKET=${_BOOK_BUCKET}

images:
  - ${_AR_REPO}/site:v$SHORT_SHA
  - ${_AR_REPO}/bookend:v$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY