# Guitar site — Cloud Build pipeline
#
# Prerequisites (one-time GCP setup):
#   - GCS bucket with public read (allUsers: storage.objectViewer)
#   - nginx in the site image proxies /pdf/ to the bucket (no browser CORS needed)
#   - catalog PDFs live under pub/ in the bucket; hidden dirs sync separately
#   - Artifact Registry repo for container images
#   - Cloud Build service account: storage.objectAdmin on bucket, Cloud Run Admin, AR Writer
#
# Substitutions (set when triggering the build):
#   _REGION        — e.g. us-east4
#   _AR_REPO       — e.g. us-east4-docker.pkg.dev/PROJECT/guitar
#   _SERVICE       — Cloud Run service name, e.g. guitar-site
#   _BOOKEND_SERVICE — Cloud Run service name for book API, e.g. guitar-bookend
#   _PDF_BUCKET    — GCS bucket name (without gs://)
#   _BOOK_BUCKET   — GCS bucket for user PDF uploads (without gs://)
#   _PDF_BASE_URL  — same-origin PDF path proxied to GCS, e.g. /pdf
#
# Example:
#   gcloud builds submit --config=build-site.yaml \
#     --substitutions=...,_PDF_BASE_URL=/pdf

substitutions:
  _REGION: us-east4
  _AR_REPO: us-east4-docker.pkg.dev/skelterjohnguitar/guitar
  _SERVICE: guitar-site
  _BOOKEND_SERVICE: guitar-bookend
  _PDF_BUCKET: skelterjohnguitar-pdf
  _BOOK_BUCKET: skelterjohnguitar-book
  _PDF_BASE_URL: /pdf
  _FIREBASE_PROJECT_ID: skelterjohnguitar

steps:
  - name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        staging=$$(mktemp -d)
        cp pdf/*.pdf "$$staging/"
        gsutil -m rsync -r -d "$$staging/" "gs://${_PDF_BUCKET}/pub/"

  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - cd site && npm ci && ENRICH_HASHES=1 npm run enrich && npm run validate

  - name: gcr.io/cloud-builders/docker
    dir: site
    args:
      - build
      - --build-arg
      - VITE_PDF_BASE_URL=${_PDF_BASE_URL}
      - --tag=${_AR_REPO}/site:v$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REPO}/site:v$SHORT_SHA

  - name: gcr.io/cloud-builders/gcloud
    args:
      - -q
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_REPO}/site:v$SHORT_SHA
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --revision-suffix=v$SHORT_SHA
      - --service-account=skelterjohnguitar-site@skelterjohnguitar.iam.gserviceaccount.com
      - --port=8080

  - name: gcr.io/cloud-builders/docker
    dir: site/bookend
    args:
      - build
      - --tag=${_AR_REPO}/bookend:v$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REPO}/bookend:v$SHORT_SHA

  - name: gcr.io/cloud-builders/gcloud
    args:
      - -q
      - run
      - deploy
      - ${_BOOKEND_SERVICE}
      - --image=${_AR_REPO}/bookend:v$SHORT_SHA
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --revision-suffix=v$SHORT_SHA
      - --service-account=skelterjohnguitar-site@skelterjohnguitar.iam.gserviceaccount.com
      - --port=8080
      - --set-env-vars=FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},BOOK_BUCKET=${_BOOK_BUCKET}

images:
  - ${_AR_REPO}/site:v$SHORT_SHA
  - ${_AR_REPO}/bookend:v$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY