server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cloud Run terminates TLS and forwards to :8080; keep redirects relative
    # so browsers stay on https://guitar.skelterjohn.me/…
    absolute_redirect off;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location ~ ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest|njgo-manifest\.webmanifest|bluebridge-manifest\.webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ \.mjs$ {
        types { }
        default_type application/javascript;
        try_files $uri =404;
    }

    location = /catalog {
        try_files /catalog.html =404;
    }

    location = /njgo {
        if ($host ~* ^(www\.)?njgo\.org$) {
            return 301 /;
        }
        try_files /njgo.html =404;
    }

    location ^~ /catalog/view/ {
        try_files $uri.html $uri /index.html;
    }

    location ^~ /catalog/ {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /rep {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location = /bookend {
        return 308 /bookend/;
    }

    location ^~ /bookend/ {
        proxy_pass ${BOOKEND_ORIGIN}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /view/ {
        if ($host !~* ^(www\.)?bluebridge\.skelterjohn\.me$) {
            return 301 /catalog$request_uri;
        }
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location = /book {
        if ($host ~* ^(www\.)?bluebridge\.skelterjohn\.me$) {
            return 301 /;
        }
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /index.html =404;
    }

    location ^~ /book/view/ {
        if ($host ~* ^(www\.)?bluebridge\.skelterjohn\.me$) {
            rewrite ^/book/view/(.*)$ /view/$1 permanent;
        }
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /book/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        if ($host ~* ^(www\.)?njgo\.org$) {
            rewrite ^/$ /njgo.html last;
        }
        if ($host ~* ^(www\.)?bluebridge\.skelterjohn\.me$) {
            add_header X-Robots-Tag "noindex, nofollow" always;
        }
        try_files $uri $uri/ /index.html;
    }

    location /pdf/ {
        proxy_pass https://storage.googleapis.com/skelterjohnguitar-pdf/;
        proxy_ssl_server_name on;
        proxy_set_header Host storage.googleapis.com;
    }
}
