<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="bluebridge">
  <rect width="64" height="64" fill="#ffffff" />
  <g stroke="#2563eb" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- main suspension cables -->
    <path
      d="M3 47 C 11 23 14 9 18 9 C 22 9 28 33 32 33 C 36 33 42 9 46 9 C 50 9 53 23 61 47"
      stroke-width="2.5"
    />
    <!-- roadway deck -->
    <line x1="3" y1="47" x2="61" y2="47" stroke-width="3" />
    <!-- towers (two legs each) -->
    <g stroke-width="2">
      <line x1="15.5" y1="8" x2="15.5" y2="47" />
      <line x1="20.5" y1="8" x2="20.5" y2="47" />
      <line x1="43.5" y1="8" x2="43.5" y2="47" />
      <line x1="48.5" y1="8" x2="48.5" y2="47" />
      <line x1="15.5" y1="13" x2="20.5" y2="13" />
      <line x1="15.5" y1="24" x2="20.5" y2="24" />
      <line x1="15.5" y1="36" x2="20.5" y2="36" />
      <line x1="43.5" y1="13" x2="48.5" y2="13" />
      <line x1="43.5" y1="24" x2="48.5" y2="24" />
      <line x1="43.5" y1="36" x2="48.5" y2="36" />
    </g>
    <!-- suspender cables -->
    <g stroke-width="1">
      <line x1="8" y1="30" x2="8" y2="47" />
      <line x1="12" y1="18" x2="12" y2="47" />
      <line x1="26" y1="23" x2="26" y2="47" />
      <line x1="32" y1="33" x2="32" y2="47" />
      <line x1="38" y1="23" x2="38" y2="47" />
      <line x1="52" y1="18" x2="52" y2="47" />
      <line x1="56" y1="30" x2="56" y2="47" />
    </g>
  </g>
</svg>
