# Director sourced from https://jaysonmartinez.org/about
name: "Dr. Jayson Martínez"
image: /roster/jayson_martinez.jpeg
bio: |-
  Guitarist, scholar, and arts educator Dr. Jayson Martínez holds the historic distinction of being the first guitar major in the history of the prestigious Newark Arts High School, the nation's first public high school dedicated exclusively to the visual and performing arts. As Director of Guitar Studies at his alma mater, Dr. Martínez established a nationally recognized program, earning numerous accolades including the 2018 Teacher of the Year Award, as well as nominations for the GRAMMY Music Educator Award in 2024 and 2025. Under his leadership, his students have garnered significant honors and have performed at premier venues across the United States, including appearances for United States Secretary of Education Miguel Cardona in Washington, DC, performances at NAfME All-National Festivals, and opening engagements for Grammy Award–winning duo Rodrigo y Gabriela.

  Dr. Martínez received his formal musical training at New Jersey City University, where he studied under the esteemed pedagogue Dr. Ana María Rosado. He earned degrees in Music Education (B.A.), Music Performance (M.Mus.), and Educational Supervision and Administration (M.Ed.Ld.), and later earned his Doctorate in Music Education from Liberty University. As a featured soloist, he has performed for and alongside internationally renowned classical guitarists including Jason Vieaux, Ben Verdery, Roland Dyens, and William Kanengiser.

  Currently, Dr. Martínez serves as the Supervisor of Visual and Performing Arts for the Newark Public Schools in Newark, NJ, providing district-wide leadership in curriculum development, instructional practice, and arts advocacy. His extensive professional service includes roles as Chair for Guitar Education with the New Jersey Music Educators Association (NJMEA), Director of the NJMEA Honors Guitar Ensemble, and Eastern Division Representative for the National Association for Music Education (NAfME) Council of Guitar Education. In addition, he serves as an Adjunct Professor of Guitar Studies at Kean University.

  An accomplished classical guitarist, Dr. Martínez was appointed Concertmaster of the New York City Classical Guitar Orchestra, performing at Carnegie Hall in 2019 as part of the Aaron Shearer Centennial Celebration. His work as an educator and advocate for guitar education has been featured on national platforms, including Bill Swick's "Guitarists in the Classroom" podcast and TopMusic.co.

  In 2021, Dr. Martínez founded the New Jersey Guitar Orchestra (NJGO), serving as its conductor and artistic director. The ensemble has achieved notable recognition, including a featured performance at Merkin Hall in New York City in 2022 with the United States Guitar Orchestra, and performances at Carnegie Hall's Weill Recital Hall in 2024 and 2025 as featured guests of the Laureate Gala Series.

  Dedicated to arts education at every level, Dr. Martínez is also the owner of Tremolo Music Studio LLC in Clifton, New Jersey, where he continues to provide high-level musical instruction to aspiring musicians of all ages.
