# Overview sourced from https://jaysonmartinez.org/njgo
logo: /njgo/logo_black.png
paragraphs:
  - >-
    The NJGO is an elite ensemble of classical guitarists of various backgrounds,
    from amateurs to professional guitarists and teachers. The NJGO is active
    during the Fall and Spring semester sessions each year. Our mission is to
    provide a space for personal expression, expand the artistic experience, and
    foster community by empowering people to create, perform, respond, and
    connect to all things GUITAR !
  - >-
    Our rehearsals are every Wednesday @ 7:00-9:00pm at Kean University Wilkins
    Theatre: 550 1000 Morris Avenue, Union NJ.
  - >-
    Attendance and punctuality are crucial in order to continuously produce an
    effective ensemble.
